<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login — Bhagwati CSC Centre</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ══════════════════════════════════════════
     LOGIN WALL  (always shown first)
══════════════════════════════════════════ -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <img src="../assets/images/logo.png" alt="Bhagwati CSC Centre" class="login-logo">
    <h2>Admin Panel Login</h2>
    <p class="sub">Bhagwati CSC Centre — Authorised Access Only</p>

    <!-- Lockout notice -->
    <div class="login-lockout" id="lockout-notice">
      <i class="fas fa-ban"></i> <strong>Account Locked!</strong><br>
      Too many incorrect attempts.<br>
      <strong id="lockout-timer">Please wait…</strong>
    </div>

    <div id="login-form-wrap">
      <div class="login-field">
        <label for="admin-pass">Password</label>
        <i class="fas fa-lock field-icon"></i>
        <input type="password" id="admin-pass" placeholder="Enter admin password" autocomplete="current-password">
        <button type="button" class="eye-toggle" id="eye-toggle" aria-label="Toggle password visibility">
          <i class="fas fa-eye" id="eye-icon"></i>
        </button>
      </div>

      <button class="login-btn" onclick="doLogin()">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>

      <div class="login-error" id="login-error">
        <i class="fas fa-exclamation-circle"></i>
        <span id="error-msg">Incorrect password.</span>
      </div>
      <div class="attempt-warn" id="attempt-warn"></div>
    </div>

    <div class="default-hint">
      <i class="fas fa-info-circle"></i>
      Default password: <code>Admin@1234</code> — Change it after first login.
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     ADMIN PANEL (shown only after login)
══════════════════════════════════════════ -->
<div class="admin-content" id="admin-content">

  <div class="admin-nav-bar">
    <h1><i class="fas fa-shield-alt"></i> Admin Panel — Bhagwati CSC Centre</h1>
    <div class="admin-nav-links">
      <a href="../index.html" target="_blank"><i class="fas fa-external-link-alt"></i> View Site</a>
      <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>

  <div class="admin-wrapper">

    <div class="admin-top-bar">
      <h2>⚙️ Service Price Manager</h2>
      <div class="admin-actions">
        <button class="btn-save"   onclick="saveAllPrices()"><i class="fas fa-save"></i> Save All</button>
        <button class="btn-danger" onclick="resetToDefault()"><i class="fas fa-undo"></i> Reset Default</button>
        <button class="btn-export" onclick="exportJSON()"><i class="fas fa-download"></i> Export JSON</button>
      </div>
    </div>

    <!-- Change Password -->
    <div class="change-pass-box">
      <h3><i class="fas fa-key" style="color:var(--saffron);margin-right:8px;"></i>Change Admin Password</h3>
      <div class="pass-fields">
        <input type="password" id="cur-pass"  placeholder="Current password">
        <input type="password" id="new-pass"  placeholder="New password (min 8 chars)">
        <input type="password" id="conf-pass" placeholder="Confirm new password">
        <button class="btn-save" onclick="doChangePass()"><i class="fas fa-lock"></i> Update</button>
      </div>
    </div>

    <!-- Dynamic tables -->
    <div id="admin-tables"></div>
  </div>
</div>

<div id="toast-container"></div>

<script src="../js/services.js"></script>
<script src="../js/admin-auth.js"></script>
<script>
/* ── Toast ── */
function showToast(msg, type = "info") {
  const c = document.getElementById("toast-container");
  const t = document.createElement("div");
  t.className = `toast ${type}`;
  const icons = { success:"fa-check-circle", error:"fa-times-circle", info:"fa-info-circle" };
  t.innerHTML = `<i class="fas ${icons[type]||icons.info}"></i> ${msg}`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

/* ── Eye toggle ── */
document.getElementById("eye-toggle").addEventListener("click", () => {
  const inp  = document.getElementById("admin-pass");
  const icon = document.getElementById("eye-icon");
  if (inp.type === "password") { inp.type = "text";     icon.className = "fas fa-eye-slash"; }
  else                         { inp.type = "password"; icon.className = "fas fa-eye"; }
});

/* ── Enter key ── */
document.getElementById("admin-pass").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

/* ── Lockout countdown ── */
let lockTimer;
function startLockoutUI(until) {
  document.getElementById("lockout-notice").classList.add("show");
  const form = document.getElementById("login-form-wrap");
  form.style.opacity = "0.25";
  form.style.pointerEvents = "none";

  function tick() {
    const left = until - Date.now();
    if (left <= 0) {
      clearInterval(lockTimer);
      document.getElementById("lockout-notice").classList.remove("show");
      form.style.opacity = "1";
      form.style.pointerEvents = "auto";
      localStorage.removeItem("admin_lockout_until");
      return;
    }
    const m = Math.floor(left / 60000);
    const s = Math.floor((left % 60000) / 1000);
    document.getElementById("lockout-timer").textContent = `Try again in ${m}:${String(s).padStart(2,"0")}`;
  }
  tick();
  lockTimer = setInterval(tick, 1000);
}

/* ── Init on page load ── */
(function init() {
  seedPassword();
  const lockUntil = getLockout();
  if (lockUntil) startLockoutUI(lockUntil);
  if (isAuthenticated()) revealPanel();
})();

/* ── Login handler ── */
function doLogin() {
  const pass  = document.getElementById("admin-pass").value;
  const errEl = document.getElementById("login-error");
  const warn  = document.getElementById("attempt-warn");
  const msg   = document.getElementById("error-msg");

  errEl.classList.remove("show");
  warn.textContent = "";

  if (!pass) { msg.textContent = "Please enter your password."; errEl.classList.add("show"); return; }

  const res = attemptLogin(pass);

  if (res.ok) {
    revealPanel();
  } else if (res.locked) {
    startLockoutUI(res.until);
  } else {
    msg.textContent = "Incorrect password. Please try again.";
    errEl.classList.add("show");
    if (res.remaining <= 2) warn.textContent = `⚠️ ${res.remaining} attempt(s) left before 15-min lockout!`;
    document.getElementById("admin-pass").value = "";
    document.getElementById("admin-pass").focus();
  }
}

function revealPanel() {
  document.getElementById("login-overlay").style.display = "none";
  document.getElementById("admin-content").classList.add("unlocked");
  renderAdminTables();
}

/* ── Change password ── */
function doChangePass() {
  const res = changePassword(
    document.getElementById("cur-pass").value,
    document.getElementById("new-pass").value,
    document.getElementById("conf-pass").value
  );
  if (res.ok) {
    showToast("Password changed! Logging out…", "success");
    setTimeout(() => location.reload(), 1800);
  } else {
    showToast(res.msg, "error");
  }
}

/* ── Admin tables ── */
const CAT_LABELS = {
  driving:"Driving Licence", pan:"PAN Card", aadhaar:"Aadhaar",
  voter:"Voter ID", passport:"Passport", certificates:"Certificates",
  govt:"Govt Schemes", bills:"Bill Payments", travel:"Travel & Banking", forms:"Form Filling"
};

function renderAdminTables() {
  const services = getServices();
  const container = document.getElementById("admin-tables");
  container.innerHTML = "";
  Object.entries(services).forEach(([cat, items]) => {
    const card = document.createElement("div");
    card.className = "admin-card";
    card.innerHTML = `
      <div class="admin-card-head">
        <span>${CAT_LABELS[cat] || cat}</span>
        <span style="font-size:.78rem;color:var(--gray);">${items.length} services</span>
      </div>
      <table class="admin-table">
        <thead><tr><th>Service</th><th>Description</th><th style="text-align:right;">Price (&#8377;)</th></tr></thead>
        <tbody>
          ${items.map(s => `
            <tr>
              <td><i class="fas ${s.icon}" style="color:var(--blue);margin-right:8px;"></i>${s.title}</td>
              <td style="color:var(--gray);font-size:.82rem;">${s.desc}</td>
              <td style="text-align:right;">
                <input type="number" class="price-input" data-id="${s.id}" value="${s.price}" min="0">
              </td>
            </tr>`).join("")}
        </tbody>
      </table>`;
    container.appendChild(card);
  });
}

function saveAllPrices() {
  const services = getServices();
  document.querySelectorAll(".price-input").forEach(inp => {
    const id = inp.dataset.id;
    Object.values(services).forEach(items => {
      const item = items.find(s => s.id === id);
      if (item) item.price = parseInt(inp.value) || 0;
    });
  });
  localStorage.setItem("csc_services", JSON.stringify(services));
  showToast("All prices saved!", "success");
}

function resetToDefault() {
  if (confirm("Reset all prices to factory defaults? This cannot be undone.")) {
    localStorage.removeItem("csc_services");
    renderAdminTables();
    showToast("Reset to default prices.", "info");
  }
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(getServices(), null, 2)], { type:"application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "csc_services_backup.json";
  a.click();
  showToast("Exported!", "success");
}
</script>
</body>
</html>
